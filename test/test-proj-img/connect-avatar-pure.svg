<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"></stop>
      <stop offset="50%" style="stop-color:#16213e"></stop>
      <stop offset="100%" style="stop-color:#0f3460"></stop>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"></stop>
      <stop offset="100%" style="stop-color:#ff6b6b"></stop>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"></stop>
      <stop offset="100%" style="stop-color:#e0e0e0"></stop>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#e94560" flood-opacity="0.3"></feDropShadow>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"></feGaussianBlur>
      <feMerge><feMergeNode in="coloredBlur"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
  </defs>

  <rect width="800" height="800" rx="160" ry="160" fill="url(#bg)"></rect>

  <g opacity="0.04">
    <line x1="200" y1="0" x2="200" y2="800" stroke="white" stroke-width="1"></line>
    <line x1="400" y1="0" x2="400" y2="800" stroke="white" stroke-width="1"></line>
    <line x1="600" y1="0" x2="600" y2="800" stroke="white" stroke-width="1"></line>
    <line x1="0" y1="200" x2="800" y2="200" stroke="white" stroke-width="1"></line>
    <line x1="0" y1="400" x2="800" y2="400" stroke="white" stroke-width="1"></line>
    <line x1="0" y1="600" x2="800" y2="600" stroke="white" stroke-width="1"></line>
  </g>

  <circle cx="650" cy="180" r="80" fill="none" stroke="#e94560" stroke-width="2" opacity="0.15"></circle>
  <circle cx="150" cy="620" r="60" fill="none" stroke="#e94560" stroke-width="2" opacity="0.1"></circle>
  <circle cx="680" cy="580" r="40" fill="none" stroke="#ff6b6b" stroke-width="1.5" opacity="0.12"></circle>

  <g opacity="0.2" filter="url(#glow)">
    <circle cx="180" cy="280" r="6" fill="#e94560"></circle>
    <circle cx="620" cy="250" r="5" fill="#ff6b6b"></circle>
    <circle cx="250" cy="550" r="5" fill="#e94560"></circle>
    <circle cx="580" cy="580" r="4" fill="#ff6b6b"></circle>
    <line x1="180" y1="280" x2="620" y2="250" stroke="#e94560" stroke-width="1" opacity="0.4"></line>
    <line x1="250" y1="550" x2="580" y2="580" stroke="#ff6b6b" stroke-width="1" opacity="0.3"></line>
    <line x1="180" y1="280" x2="250" y2="550" stroke="#e94560" stroke-width="1" opacity="0.3"></line>
  </g>

  <text x="400" y="420" font-family="'Caveat', cursive" font-size="148" font-weight="700" fill="url(#textGrad)" text-anchor="middle" dominant-baseline="middle" filter="url(#shadow)">Connect</text>
</svg>